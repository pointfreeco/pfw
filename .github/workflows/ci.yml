name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-26:
    name: macOS
    runs-on: macos-26
    strategy:
      matrix:
        xcode:
          - '26.2'
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode ${{ matrix.xcode }}
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app
      - name: Test
        run: swift test

  linux:
    name: Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        swift:
          - '6.3.0'
    container: swift:${{ matrix.swift }}
    steps:
      - uses: actions/checkout@v5
      - name: Test
        run: swift test
